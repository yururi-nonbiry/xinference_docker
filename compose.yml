version: '3.8'
services:
  xinference:
    image: xprobe/xinference:latest
    container_name: xinference
    ports:
      - "9997:9997"
    environment:
      - XINFERENCE_HOME=/data
      - XINFERENCE_MODEL_SRC=huggingface
    volumes:
      - ./xinference-data:/data
      - ~/.cache/huggingface:/root/.cache/huggingface # モデルキャッシュの共有
      - ./launch_models.sh:/launch_models.sh:ro
      - ./ruri_v3_310m.json:/data/ruri_v3_310m.json:ro
      - ./ruri_v3_reranker_large.json:/data/ruri_v3_reranker_large.json:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: /bin/bash /launch_models.sh
