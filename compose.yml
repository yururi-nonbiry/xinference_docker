version: '3.8'
services:
  xinference:
    image: xprobe/xinference:latest
    container_name: xinference
    ports:
      - "9997:9997"
    environment:
      - XINFERENCE_HOME=/data
      - XINFERENCE_MODEL_SRC=huggingface
    volumes:
      - ./xinference-data:/data
      - ~/.cache/huggingface:/root/.cache/huggingface # モデルキャッシュの共有
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: xinference-local --host 0.0.0.0 --port 9997
